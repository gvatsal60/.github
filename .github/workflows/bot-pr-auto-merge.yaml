name: Auto Approve Bot PRs
on: pull_request
permissions:
  pull-requests: write
  contents: write
jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.type == 'Bot' && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'pre-commit-ci[bot]')
    steps:
      - name: Approve and enable auto-merge
        run: |
          gh pr review --approve "${PR_URL}"
          gh pr merge --auto --squash "${PR_URL}"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
